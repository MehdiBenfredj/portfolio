---
title: post
active_nav: writing
---
<article class="article" id="article">loading…</article>

<script>
  const fmt = (iso) => new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  const slug = new URLSearchParams(location.search).get('slug');
  const root = document.getElementById('article');

  loadPosts().then(items => {
    const post = items.find(p => p.slug === slug);
    if (!post) {
      root.innerHTML = `<a class="back" href="/">← back</a>
        <h1>Post not found.</h1>
        <p>That one wandered off. <a href="/writing.html">See all writing</a>.</p>`;
      return;
    }
    document.title = post.title + ' — Mehdi';
    const externalCTA = post.url ? `
      <div class="external">
        <a href="${post.url}" target="_blank" rel="noopener">
          ${post.kind === 'video' ? 'watch on' : 'read on'} ${post.source || 'source'} →
        </a>
      </div>` : '';
    root.innerHTML = `
      <a class="back" href="/writing.html">← writing</a>
      <div class="post-meta" style="margin-top: 1rem;">
        <span class="meta">${fmt(post.date)}</span>
        <span class="tag">${post.kind}</span>
        ${(post.tags || []).map(t => `<span class="tag accent">#${t}</span>`).join('')}
      </div>
      <h1>${post.title || '(untitled)'}</h1>
      ${post.image ? `<img src="${post.image}" alt="" style="width:100%; border:1px solid var(--rule);">` : ''}
      ${externalCTA}
      <div class="body">${post.html}</div>
    `;
  }).catch(err => {
    root.innerHTML = `<p>Couldn't load posts. ${err.message}</p>`;
  });
</script>
