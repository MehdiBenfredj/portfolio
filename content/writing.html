---
title: writing
active_nav: writing
extra_css: /assets/writing.css
---
<main class="wrap">
  <p class="meta">writing</p>
  <h1 class="section"><span class="badge">✍️</span> Notes & essays.</h1>
  <p style="font-size: 1.2rem; color: var(--ink-2); margin: 1rem 0 2rem;">
    Longer-form things. About software, AI, the news, and whatever's on my mind. No editor. No SEO. Just me thinking out loud. 🌱
  </p>
  <div id="posts">loading…</div>
</main>

<script>
  const fmt = (iso) => new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  loadPosts().then(items => {
    const posts = items.filter(s => s.kind === 'post' || s.kind === 'thought');
    const byYear = {};
    posts.forEach(p => {
      const y = new Date(p.date).getFullYear();
      (byYear[y] = byYear[y] || []).push(p);
    });
    const years = Object.keys(byYear).sort((a,b) => b - a);
    document.getElementById('posts').innerHTML = years.map(y => `
      <div class="group-head">${y}</div>
      ${byYear[y].map(p => {
        const href = `/post.html?slug=${encodeURIComponent(p.slug)}`;
        const preview = (p.body.split('\n\n')[0] || '').slice(0, 180);
        return `<article class="post">
          <div class="post-meta">
            <span class="meta">${fmt(p.date)}</span>
            <span class="tag">${p.kind === 'post' ? 'essay' : 'note'}</span>
            ${(p.tags || []).map(t => `<span class="tag accent">#${t}</span>`).join('')}
          </div>
          <h3><a href="${href}">${p.title}</a></h3>
          <p>${preview}${preview.length >= 180 ? '…' : ''}</p>
        </article>`;
      }).join('')}
    `).join('');
  });
</script>
